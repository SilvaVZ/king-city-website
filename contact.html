<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact King City</title>
  <meta property="og:title" content="Contact King City">
  <meta property="og:description" content="Get in touch with King City about music and publishing opportunities.">
  <meta property="og:image" content="https://kngcity.com/King-City-Sticker-Logo.png">
  <meta property="og:url" content="https://kngcity.com/contact.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://kngcity.com/King-City-Sticker-Logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #f0f0f0;
    }

    /* Navigation */
    nav {
      background: #fff;
      padding: 1.5rem 0;
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      text-decoration: none;
      color: #000;
      letter-spacing: -0.5px;
      pointer-events: none;
      cursor: default;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #b24ba8;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
      color: #fff;
      padding: 4rem 2rem;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .hero p {
      color: #ccc;
      font-size: 1.05rem;
    }

    /* Form Section */
    .form-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 3rem 2rem;
      background: #f0f0f0;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
      background: #ffffff;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #000;
    }

    textarea {
      resize: vertical;
      min-height: 150px;
    }

    button {
      background: #000;
      color: #fff;
      padding: 0.9rem 2rem;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }

    button:hover {
      background: #b24ba8;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .success-message {
      display: none;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* Footer */
    footer {
      background: #000;
      color: #fff;
      padding: 2rem;
      text-align: center;
      font-size: 0.9rem;
      margin-top: 4rem;
    }

    footer a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #666;
      transition: border-color 0.2s;
    }

    footer a:hover {
      border-bottom-color: #fff;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav .container {
        padding: 1rem 2rem;
      }

      .logo img {
        height: 70px !important;
      }

      .hero h1 {
        font-size: 1.8rem;
      }

      nav ul {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo"><img src="King-City-Sticker-Logo.png" alt="King City" style="height: 100px; width: auto; display: block;"></a>
      <ul>
        <li><a href="/#divisions">Divisions</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <h1>Get in Touch</h1>
    <p>Questions about King City Music or interested in the label? We'd like to hear from you.</p>
  </section>

  <section class="form-section">
    <div class="success-message" id="successMessage">
      Thank you. We've received your message and will get back to you soon.
    </div>

    <form name="contact" method="POST" netlify onsubmit="return handleSubmit(event)">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject *</label>
        <input type="text" id="subject" name="subject" required>
      </div>

      <div class="form-group">
        <label for="message">Message *</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit" id="submitBtn">Send Message</button>
    </form>
  </section>

  <footer>
    <div class="container">
      <p>&copy; <span id="year">2026</span> King City. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <script>
    function handleSubmit(event) {
      event.preventDefault();
      const form = event.target;
      const submitBtn = document.getElementById('submitBtn');
      const successMessage = document.getElementById('successMessage');

      // Disable submit button
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      // Netlify Forms will handle submission
      const formData = new FormData(form);
      
      fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(formData).toString(),
      })
      .then(() => {
        // Show success message
        successMessage.style.display = 'block';
        form.reset();
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
        
        // Hide success message after 5 seconds
        setTimeout(() => {
          successMessage.style.display = 'none';
        }, 5000);
      })
      .catch((error) => {
        console.error('Error:', error);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
        alert('There was an error sending your message. Please try again.');
      });

      return false;
    }
  </script>
</body>
</html>
